<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Routine</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Routine">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #6366f1;
            --accent-success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
        }

        .app {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input[type="time"], input[type="text"] {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        input[type="time"] {
            width: 100px;
        }

        input[type="text"] {
            flex: 1;
        }

        .add-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0 16px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.15);
            padding: 16px;
            border-radius: 16px;
            border-left: 4px solid var(--accent);
            transition: all 0.2s ease;
        }

        .task-item.completed {
            border-left-color: var(--accent-success);
            opacity: 0.5;
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .task-time {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.1rem;
        }

        .task-item.completed .task-time {
            color: var(--accent-success);
            text-decoration: line-through;
        }

        .task-text {
            font-size: 1rem;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .checkbox-wrapper {
            position: relative;
            width: 24px;
            height: 24px;
        }

        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            opacity: 0;
            position: absolute;
            cursor: pointer;
            z-index: 2;
        }

        .custom-checkbox {
            position: absolute;
            top: 0;
            left: 0;
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-muted);
            border-radius: 8px;
            transition: all 0.2s;
        }

        input[type="checkbox"]:checked + .custom-checkbox {
            background: var(--accent-success);
            border-color: var(--accent-success);
        }

        input[type="checkbox"]:checked + .custom-checkbox::after {
            content: "✓";
            position: absolute;
            color: white;
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="app">
        <header>
            <h1>Ma Routine</h1>
            <button class="reset-btn" onclick="resetDay()">Réinitialiser</button>
        </header>

        <div class="form-group">
            <input type="time" id="taskTime" required>
            <input type="text" id="taskText" placeholder="Nouvelle tâche..." required>
            <button class="add-btn" onclick="addTask()">+</button>
        </div>

        <div class="task-list" id="taskList"></div>
    </div>

    <script>
        // Chargement des tâches depuis le localStorage ou tâches par défaut
        let defaultTasks = [
            { time: "08:00", text: "Séance de street workout", completed: false, alerted: false },
            { time: "09:00", text: "Courir", completed: false, alerted: false },
            { time: "09:30", text: "Mettre la crème", completed: false, alerted: false },
            { time: "10:30", text: "Session de développement web", completed: false, alerted: false }
        ];

        let tasks = JSON.parse(localStorage.getItem('routine_tasks')) || defaultTasks;

        function saveTasks() {
            localStorage.setItem('routine_tasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            tasks.sort((a, b) => a.time.localeCompare(b.time));
            const container = document.getElementById('taskList');
            container.innerHTML = '';

            tasks.forEach((task, index) => {
                const item = document.createElement('div');
                item.className = `task-item ${task.completed ? 'completed' : ''}`;
                
                item.innerHTML = `
                    <div class="task-info">
                        <span class="task-time">${task.time}</span>
                        <span class="task-text">${task.text}</span>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index})">
                        <div class="custom-checkbox"></div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function addTask() {
            const timeInput = document.getElementById('taskTime').value;
            const textInput = document.getElementById('taskText').value;

            if (timeInput && textInput) {
                tasks.push({ time: timeInput, text: textInput, completed: false, alerted: false });
                document.getElementById('taskTime').value = '';
                document.getElementById('taskText').value = '';
                saveTasks();
                renderTasks();
            }
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        }

        function resetDay() {
            tasks.forEach(t => {
                t.completed = false;
                t.alerted = false;
            });
            saveTasks();
            renderTasks();
        }

        function checkReminders() {
            const now = new Date();
            const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            tasks.forEach(task => {
                if (task.time === currentTime && !task.completed && !task.alerted) {
                    task.alerted = true;
                    saveTasks();
                    alert(`⏰ Routine : C'est l'heure de "${task.text}"`);
                }
                if (task.time !== currentTime && task.alerted) {
                    task.alerted = false;
                    saveTasks();
                }
            });
        }

        // Initialisation
        renderTasks();
        setInterval(checkReminders, 5000);

        // Enregistrement du Service Worker pour le mode PWA / Hors-ligne
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker enregistré !'))
                    .catch(err => console.log('Erreur SW:', err));
            });
        }
    </script>
</body>
</html>
